server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text-based assets on the fly.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # Hashed build assets are immutable — cache them aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history fallback: unknown paths return index.html so client-side
    # routing (and deep links / refreshes) work.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html itself must never be cached, or clients pin a stale build.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
